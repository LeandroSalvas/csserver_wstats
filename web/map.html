<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ranking do mapa - CS 1.6 Stats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="header">
      <h1 id="mapTitle">🗺️ Ranking do mapa</h1>
    </div>

    <div class="page-nav"></div>

    <div id="statusMessage" class="status-message"></div>

    <div class="card">
      <h2>Top jogadores</h2>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th>Kills</th>
            <th>Deaths</th>
            <th>HS</th>
            <th>KD</th>
            <th>Skill</th>
          </tr>
        </thead>
        <tbody id="mapRanking"></tbody>
      </table>
    </div>
  </div>

  <script src="common.js" defer></script>
  <script src="map.js" defer></script>
</body>
</html>
