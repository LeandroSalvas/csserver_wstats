server {
  listen 80;
  server_name localhost;

  gzip on;
  gzip_vary on;
  gzip_comp_level 4;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 256;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy da API (evita expor :3000 e elimina CORS quando usar mesma origem)
  location /api/ {
    proxy_pass http://api:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(css|js|json|jpg|jpeg|png|svg|woff2?|ico|ttf|eot)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }
}
