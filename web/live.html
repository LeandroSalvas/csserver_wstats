<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="live.title">Live Match - CS 1.6</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>📡 <span data-i18n="live.title">Live Match</span></h1>
      <div class="lang-toggle-slot"></div>
    </div>

    <div class="page-nav"></div>

    <div id="statusMessage" class="status-message"></div>

    <div class="card">
      <h2 id="liveHostname" data-i18n="server.hostname">Servidor</h2>

      <div class="live-summary">
        <div class="live-box">
          <span class="live-label" data-i18n="live.currentMap">🎮 Mapa atual</span>
          <strong id="liveMap">-</strong>
        </div>

        <div class="live-box">
          <span class="live-label" data-i18n="live.playersOnline">👥 Players online</span>
          <strong id="liveCount">0</strong>
        </div>
      </div>
    </div>

    <div class="scoreboard">
      <div class="scoreboard-team scoreboard-t">
        <div class="scoreboard-team-header">
          <span data-i18n="live.terrorists">Terrorists</span>
          <span id="tCount">0 players</span>
        </div>

        <table>
          <thead>
            <tr>
              <th data-i18n="labels.player">Player</th>
              <th data-i18n="live.status">Status</th>
              <th data-i18n="live.score">Score</th>
              <th data-i18n="labels.deaths">Deaths</th>
	      <th data-i18n="labels.kd">KD</th>
            </tr>
          </thead>
          <tbody id="tPlayers"></tbody>
        </table>
      </div>

      <div class="scoreboard-team scoreboard-ct">
        <div class="scoreboard-team-header">
          <span data-i18n="live.counterTerrorists">Counter-Terrorists</span>
          <span id="ctCount">0 players</span>
        </div>

        <table>
          <thead>
            <tr>
              <th data-i18n="labels.player">Player</th>
              <th data-i18n="live.status">Status</th>
              <th data-i18n="live.score">Score</th>
              <th data-i18n="labels.deaths">Deaths</th>
	      <th data-i18n="labels.kd">KD</th>
            </tr>
          </thead>
          <tbody id="ctPlayers"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
  <h2 data-i18n="live.killFeed">🔫 Kill Feed</h2>
  <div id="killFeed" class="kill-feed">
    <div class="kill-feed-empty" data-i18n="labels.noRecentKills">Nenhuma kill recente.</div>
  </div>
</div>
  </div>

  <script src="i18n/translations.js" defer></script>
  <script src="common.js" defer></script>
  <script src="live.js" defer></script>
</body>
</html>
