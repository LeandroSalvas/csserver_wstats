<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="nav.maps">Mapas - CS 1.6 Stats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="header">
      <h1> <span data-i18n="nav.maps">Ranking por mapa</span></h1>
      <div class="lang-toggle-slot"></div>
    </div>

    <div class="page-nav"></div>

    <div id="statusMessage" class="status-message"></div>

    <div class="card">
      <h2 data-i18n="labels.availableMaps">Mapas disponíveis</h2>

      <table>
        <thead>
          <tr>
            <th data-i18n="labels.rank">#</th>
            <th data-i18n="labels.map">Mapa</th>
            <th data-i18n="labels.matches">Partidas</th>
          </tr>
        </thead>
        <tbody id="mapsTable"></tbody>
      </table>
    </div>
  </div>

  <script src="i18n/translations.js" defer></script>
  <script src="common.js" defer></script>
  <script src="maps.js" defer></script>
</body>
</html>
