services:
  cs16:
    image: leandrosalvas/cs16_stats
    restart: always
    depends_on:
      - db
    volumes:
      - ./config/users.ini:/home/cs16/cstrike/addons/amxmodx/configs/users.ini
      - ./config/motd.txt:/home/cs16/cstrike/motd.txt
      - ./config/mapcycle.txt:/home/cs16/cstrike/mapcycle.txt
      - ./config/server.cfg:/home/cs16/cstrike/server.cfg
      - ./live/live_scoreboard.json:/home/cs16/cstrike/addons/amxmodx/data/live/live_scoreboard.json
      - ./live/live_killfeed.json:/home/cs16/cstrike/addons/amxmodx/data/live/live_killfeed.json

    ports:
      - "27015:27015/udp"
      - "27015:27015/tcp"

  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20


  api:
    build: ./api
    container_name: cs16-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_STORE: ${SESSION_STORE:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      RCON_PASSWORD: ${RCON_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
#    ports:
#      - "3000:3000"  
    volumes: 
      - ./live/live_scoreboard.json:/home/cs16/cstrike/addons/amxmodx/data/live/live_scoreboard.json:ro
      - ./live/live_killfeed.json:/home/cs16/cstrike/addons/amxmodx/data/live/live_killfeed.json:ro
      
  web:
    image: nginx:alpine
    container_name: cs16-web
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always


volumes:
  db_data:
  redis_data:
